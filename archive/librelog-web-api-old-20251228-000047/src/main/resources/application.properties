spring.application.name=librelog
app.version=0.0.2-SNAPSHOT

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/librelog
spring.datasource.username=librelog
spring.datasource.password=${POSTGRES_PASSWORD:changeme-in-production}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master-rebuild.xml
spring.liquibase.enabled=true
spring.liquibase.drop-first=false
spring.liquibase.change-log-parameters.prefix=

# Server Configuration
server.port=8000
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# Logging Configuration
logging.level.root=INFO
logging.level.com.onelpro.librelog=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.config-url=/api-docs/swagger-config
springdoc.swagger-ui.oauth.client-id=librelog
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true

# JWT Configuration
jwt.secret=${JWT_SECRET:default-secret-key-change-in-production-minimum-256-bits-for-hmac-sha-256-algorithm}
jwt.access-token-expiration-minutes=60
jwt.refresh-token-expiration-days=7

