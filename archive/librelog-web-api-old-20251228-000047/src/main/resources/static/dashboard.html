<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>User Administration - LibreLog</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📻</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --text: #f5f5f5;
            --text-muted: #b0b0b0;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px; /* Space for fixed footer */
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-badge {
            background: rgba(102, 126, 234, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-muted);
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .search-box {
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            width: 300px;
        }

        .search-box:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .table-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(102, 126, 234, 0.2);
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-admin {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .badge-producer {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .badge-dj {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .badge-sales {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .badge-inactive {
            background: rgba(107, 114, 128, 0.2);
            color: #d1d5db;
        }

        .badge-banned {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.85rem;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .btn-edit:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">LibreLog</div>
        <div class="user-info">
            <span class="user-badge" id="userBadge">Loading...</span>
            <a href="/login.html" class="btn btn-secondary" onclick="logout()">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">User Administration</h1>
            <p class="page-subtitle">Manage users, roles, and permissions</p>
        </div>

        <div class="actions-bar">
            <button class="btn btn-primary" onclick="openCreateModal()">+ Create New User</button>
            <input type="text" class="search-box" id="searchBox" placeholder="Search users..." onkeyup="filterUsers()">
        </div>

        <div id="message" class="message"></div>

        <div class="table-container">
            <div id="loading" class="loading">Loading users...</div>
            <table id="usersTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Last Login</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <p>No users found</p>
            </div>
        </div>
    </div>

    <!-- Create/Edit User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Create New User</h2>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Roles *</label>
                    <div id="rolesContainer" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem; min-height: 2.5rem; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9;">
                        <!-- Role badges will be added here dynamically -->
                    </div>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <select id="roleSelect" style="flex: 1; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="">Select a role to add</option>
                            <option value="ADMIN">Admin</option>
                            <option value="PRODUCER">Producer</option>
                            <option value="DJ">DJ</option>
                            <option value="SALES">Sales</option>
                        </select>
                        <button type="button" id="addRoleBtn" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Add Role</button>
                    </div>
                    <small style="color: #666; display: block; margin-top: 0.25rem;">Click the X on a role badge to remove it</small>
                </div>
                <div class="form-group">
                    <label for="status">Status *</label>
                    <select id="status" required>
                        <option value="ACTIVE">Active</option>
                        <option value="INACTIVE">Inactive</option>
                        <option value="BANNED">Banned</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let users = [];
        let currentUser = null;
        const token = localStorage.getItem('accessToken');

        // Check authentication
        if (!token) {
            window.location.href = '/login.html';
        }

        // Load current user info
        const userData = localStorage.getItem('user');
        if (userData) {
            currentUser = JSON.parse(userData);
            document.getElementById('userBadge').textContent = `${currentUser.username} (${currentUser.role})`;
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch('/api/users', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401 || response.status === 403) {
                    console.log('Unauthorized, redirecting to login');
                    localStorage.removeItem('accessToken');
                    localStorage.removeItem('refreshToken');
                    localStorage.removeItem('user');
                    window.location.href = '/login.html';
                    return;
                }

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Failed to load users:', response.status, errorText);
                    throw new Error('Failed to load users');
                }

                users = await response.json();
                renderUsers(users);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('usersTable').style.display = 'table';
            } catch (error) {
                console.error('Error loading users:', error);
                if (error.message.includes('401') || error.message.includes('403')) {
                    window.location.href = '/login.html';
                    return;
                }
                showMessage('Failed to load users', 'error');
            }
        }

        function renderUsers(userList) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            if (userList.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('usersTable').style.display = 'none';
                return;
            }

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('usersTable').style.display = 'table';

            userList.forEach(user => {
                const tr = document.createElement('tr');
                const createdDate = new Date(user.createdAt).toLocaleDateString();
                const lastLogin = user.lastLogin ? new Date(user.lastLogin).toLocaleDateString() : 'Never';
                
                // Handle both single role (backward compatibility) and multiple roles
                const roles = user.roles || (user.role ? [user.role] : []);
                const rolesDisplay = roles.length > 0 
                    ? roles.map(r => `<span class="badge badge-${r.toLowerCase()}">${r}</span>`).join(' ')
                    : '<span class="badge">No roles</span>';

                tr.innerHTML = `
                    <td>${user.username}</td>
                    <td>${rolesDisplay}</td>
                    <td><span class="badge badge-${user.status.toLowerCase()}">${user.status}</span></td>
                    <td>${createdDate}</td>
                    <td>${lastLogin}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-edit" onclick="editUser('${user.id}')">Edit</button>
                            <button class="btn btn-sm btn-delete" onclick="deleteUser('${user.id}')" ${user.id === currentUser?.id ? 'disabled' : ''}>Delete</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterUsers() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const filtered = users.filter(user => {
                const roles = user.roles || (user.role ? [user.role] : []);
                const rolesText = roles.join(' ').toLowerCase();
                return user.username.toLowerCase().includes(search) ||
                    rolesText.includes(search) ||
                    user.status.toLowerCase().includes(search);
            });
            renderUsers(filtered);
        }

        // Role management functions
        function clearRoles() {
            const container = document.getElementById('rolesContainer');
            container.innerHTML = '';
        }

        function addRole(role) {
            const container = document.getElementById('rolesContainer');
            const existingRoles = Array.from(container.querySelectorAll('.role-badge')).map(b => b.dataset.role);
            
            if (existingRoles.includes(role)) {
                showMessage('This role is already added', 'error');
                return;
            }

            const badge = document.createElement('span');
            badge.className = 'role-badge';
            badge.dataset.role = role;
            badge.style.cssText = 'display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0.75rem; background: #667eea; color: white; border-radius: 1rem; font-size: 0.875rem; font-weight: 500;';
            badge.innerHTML = `
                <span>${role}</span>
                <button type="button" onclick="removeRole('${role}')" style="background: none; border: none; color: white; cursor: pointer; padding: 0; margin-left: 0.25rem; font-size: 1rem; line-height: 1; width: 1.25rem; height: 1.25rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='none'">×</button>
            `;
            container.appendChild(badge);
            document.getElementById('roleSelect').value = '';
        }

        function removeRole(role) {
            const badge = document.querySelector(`.role-badge[data-role="${role}"]`);
            if (badge) {
                badge.remove();
            }
        }

        function getSelectedRoles() {
            return Array.from(document.querySelectorAll('.role-badge')).map(b => b.dataset.role);
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Create New User';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('username').disabled = false;
            document.getElementById('password').required = true;
            document.getElementById('password').placeholder = '';
            clearRoles();
            document.getElementById('userModal').classList.add('active');
        }

        function editUser(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;

            document.getElementById('modalTitle').textContent = 'Edit User';
            document.getElementById('userId').value = user.id;
            document.getElementById('username').value = user.username;
            document.getElementById('username').disabled = true;
            document.getElementById('password').required = false;
            document.getElementById('password').placeholder = 'Leave blank to keep current password';
            
            // Handle both single role (backward compatibility) and multiple roles
            const roles = user.roles || (user.role ? [user.role] : []);
            clearRoles();
            roles.forEach(role => addRole(role));
            
            document.getElementById('status').value = user.status;
            document.getElementById('userModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
            document.getElementById('username').disabled = false;
            document.getElementById('password').required = true;
            document.getElementById('password').placeholder = '';
            clearRoles(); // Clear roles when closing modal
        }

        // Add role button handler
        document.getElementById('addRoleBtn').addEventListener('click', () => {
            const roleSelect = document.getElementById('roleSelect');
            const selectedRole = roleSelect.value;
            if (selectedRole) {
                addRole(selectedRole);
            } else {
                showMessage('Please select a role to add', 'error');
            }
        });

        // Allow Enter key to add role
        document.getElementById('roleSelect').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('addRoleBtn').click();
            }
        });

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('userId').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const selectedRoles = getSelectedRoles();
            const status = document.getElementById('status').value;

            if (selectedRoles.length === 0) {
                showMessage('At least one role must be added', 'error');
                return;
            }

            if (!username || username.trim() === '') {
                showMessage('Username is required', 'error');
                return;
            }

            try {
                const userData = { username: username.trim(), roles: selectedRoles, status };
                if (password && password.trim() !== '') {
                    userData.password = password.trim();
                }

                let response;
                if (userId) {
                    // Update
                    response = await fetch(`/api/users/${userId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(userData)
                    });
                } else {
                    // Create
                    response = await fetch('/api/users', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(userData)
                    });
                }

                if (response.status === 401) {
                    window.location.href = '/login.html';
                    return;
                }

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Operation failed');
                }

                showMessage(userId ? 'User updated successfully' : 'User created successfully', 'success');
                closeModal();
                loadUsers();
            } catch (error) {
                showMessage(error.message || 'Operation failed', 'error');
            }
        });

        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user?')) {
                return;
            }

            try {
                const response = await fetch(`/api/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    window.location.href = '/login.html';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to delete user');
                }

                showMessage('User deleted successfully', 'success');
                loadUsers();
            } catch (error) {
                showMessage('Failed to delete user', 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function logout() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        // Load users on page load
        loadUsers();
    </script>

    <footer style="position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; color: #f5f5f5; padding: 1rem; text-align: center; border-top: 1px solid #2d2d44; z-index: 100;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <p style="margin: 0; font-size: 0.875rem;">&copy; 2025 LibreLog. All rights reserved.</p>
            <p style="margin: 0; font-size: 0.875rem;" class="version-info">Version: <span id="app-version">Loading...</span></p>
        </div>
    </footer>

    <script>
        // Load version info
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/version')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('app-version').textContent = data.display || `${data.version} (${data.gitCommitShort})`;
                })
                .catch(error => {
                    console.error('Error fetching version info:', error);
                    document.getElementById('app-version').textContent = 'N/A';
                });
        });
    </script>
</body>
</html>
