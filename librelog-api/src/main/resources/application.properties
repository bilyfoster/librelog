# Spring Boot Application Configuration
spring.application.name=librelog-api
server.port=${SERVER_PORT:8080}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/librelog}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:librelog}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:librelog}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Logging Configuration
logging.level.root=INFO
logging.level.com.onelpro.librelog=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-characters}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://log.gayphx.com}
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Rate Limiting Configuration
rate-limit.requests-per-minute=100

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Static Resources Configuration
# Let Spring Boot handle static resources, but ensure /api/** routes go to controllers
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.info.enabled=true
management.health.db.enabled=true

# Application Info (exposed via /actuator/info)
info.app.name=LibreLog
info.app.description=Broadcast Traffic Management System
info.app.version=@project.version@

# LibreTime Integration Configuration
libretime.base-url=${LIBRETIME_BASE_URL:http://localhost:8080}
libretime.api-key=${LIBRETIME_API_KEY:}
libretime.timeout-seconds=${LIBRETIME_TIMEOUT_SECONDS:30}
libretime.max-retries=${LIBRETIME_MAX_RETRIES:3}

