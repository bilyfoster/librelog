spring:
  application:
    name: librelog
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/librelog}
    username: ${SPRING_DATASOURCE_USERNAME:librelog}
    password: ${SPRING_DATASOURCE_PASSWORD:librelog}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  info:
    defaults:
      enabled: true
    build:
      enabled: true

librelog:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  admin:
    seed-email: ${ADMIN_SEED_EMAIL:admin@librelog.local}
    seed-password: ${ADMIN_SEED_PASSWORD:admin123}
    seed-name: ${ADMIN_SEED_NAME:Admin}
  encryption:
    key: ${ENCRYPTION_KEY:change-me-change-me-32bytes-please}

logging:
  level:
    com.onelpro.librelog: INFO
