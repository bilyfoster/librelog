spring:
  application:
    name: librelog
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/librelog}
    username: ${SPRING_DATASOURCE_USERNAME:librelog}
    password: ${SPRING_DATASOURCE_PASSWORD:librelog}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  info:
    defaults:
      enabled: true
    build:
      enabled: true

librelog:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  admin:
    seed-email: ${ADMIN_SEED_EMAIL:admin@librelog.local}
    seed-password: ${ADMIN_SEED_PASSWORD:admin123}
    seed-name: ${ADMIN_SEED_NAME:Admin}
  encryption:
    key: ${ENCRYPTION_KEY:change-me-change-me-32bytes-please}
  jazz:
    host: ${JAZZ_SFTP_HOST:}
    user: ${JAZZ_SFTP_USER:rumble_bridge}
    port: ${JAZZ_SFTP_PORT:22}
    key-path: ${JAZZ_SFTP_KEY_PATH:}
    import-path: ${JAZZ_IMPORT_PATH:/srv/libretime/rumble_import}
    import-trigger: ${JAZZ_IMPORT_TRIGGER:/usr/local/bin/rumble_import_trigger.sh}
  reconciliation:
    cron: ${LIBRELOG_RECONCILIATION_CRON:0 30 3 * * *}

logging:
  level:
    com.onelpro.librelog: INFO
